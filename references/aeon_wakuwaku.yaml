promotions:
  - description: >
      Core cashback setup: online spend earns 6%; Japan spend earns 3% (with 1.95% FX handling fee per source);
      local dining earns 1%; other spend earns 0.4%. Extra cashback cap is HKD 200 per statement cycle (online
      equivalent spend about HKD 3,571). AEON member pricing and 5% off at AEON on the 2nd and 20th are also
      listed. Cashback is issued as WAKU COIN and can be redeemed in-app in HKD 10 units.
    tc_url: "https://www.aeon.com.hk/tc/pdf/credit-card/AEONCARDWAKUWAKU_RBBD_TC.pdf"
    validity: "Until 2026-08-31"
  - description: >
      Welcome offer for new AEON cardholders (no AEON card in previous 12 months): apply via AEON App with promo
      code "WAKUWAKU" and make one transaction within 60 days for HKD 200; spend HKD 8,000 within 60 days and
      include Apple Pay / Google Pay spend for extra 10% cashback capped at HKD 500; complete four specified tasks
      (Octopus AAV, rent platform transaction, autopay setup, one App Store/Google Play transaction) for HKD 50
      each, up to HKD 200. Total welcome value shown is up to HKD 900. E-wallet transactions are marked excluded
      from qualifying spend.
    tc_url: "https://www.aeon.com.hk/tc/pdf/credit-card/AEONCARDWAKUWAKU_WO_TC.pdf"
    validity: "Until 2026-04-30"
  - description: >
      Annual fee is described as permanently waived.
