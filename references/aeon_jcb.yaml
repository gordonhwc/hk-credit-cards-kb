promotions:
  - description: >
      "Purple Lifestyle" campaign: after in-app registration, local dining, local transport, and AEON Stores
      spend via Apple Pay / Google Pay / UnionPay QR can earn up to 15X points (about 6% cashback); physical
      card spend can earn up to 5X points (about 2%). Extra points cap is 25,000 points per category per month
      (three categories combined cap 75,000 points). The page also states local dining via online platforms is
      excluded and AEON JCB is not supported for mobile-payment earning in this campaign.
    tc_url: "https://hkcashrebate.com/aeon-purple-promo"
    validity: "Until 2026-08-31"
  - description: >
      New-cardholder welcome (AEON website/App applications): within 60 days after approval, first transaction
      gives 50,000 points (up to HKD 200), HKD 6,000 spend gives 100,000 points (up to HKD 400), and Apple Pay /
      Google Pay spend of HKD 1,000 within those spends gives extra 25,000 points (up to HKD 100). Total welcome
      value shown is up to HKD 700. Eligibility is for customers without an AEON credit card in the previous
      12 months; e-wallet transactions are excluded.
    tc_url: "https://www.aeon.com.hk/tc/privilege/promotion_welcomeoffer_0325.html"
    validity: "Until 2026-04-30"
  - description: >
      Regular card features on the source page include AEON member-price privileges and 5% off at AEON on the 2nd
      and 20th of each month.
