promotions:
  - description: >
      Designated Go-merchant offer gives extra 4.6% cashback (up to 5% total with base rewards). Listed merchants
      include Keeta, Meituan, Dazhong Dianping, Didi, JD HK/MO station (bound payment), Wellcome, Market Place,
      Oliver's the Delicatessen, and 3hreesixty (excluding self-checkout and online channels). Monthly cap shown
      is HKD 2,000 merchant spend.
    tc_url: "https://www.bochk.com/dam/boccreditcard/gocard/gocardoffer_TC.pdf"
    validity: null
  - description: >
      Registered mobile-retail campaign (Apple Pay, Huawei Pay, BoC Pay+, UnionPay QR in app): Go UnionPay Diamond
      can earn up to 20X/10X/3X points for Mainland/HK/overseas mobile spend (about 8%/4%/1.2%); Go UnionPay
      Platinum can earn up to 10X/5X/2X (about 4%/2%/0.8%). Monthly cap is 25,000 points including base points.
      The page states monthly local retail-spend requirement HKD 1,500, waived to 2026-06-30.
    tc_url: "https://www.bochk.com/dam/boccreditcard/gopmq126/tnc_tc.pdf"
    validity: "Requirement waiver until 2026-06-30"
  - description: >
      New-customer welcome: issue month plus next two calendar months mobile retail spend earns extra 10% cashback,
      capped at HKD 500 on HKD 5,000 spend. Existing-customer welcome: HKD 200 after HKD 5,000 qualifying spend.
      Qualifying transactions exclude e-wallet transfer and Octopus AAV.
    tc_url: "https://www.bochk.com/dam/boccreditcard/gocard/Go_WG_TC.pdf"
    validity: "Until 2026-12-31"
  - description: >
      The source page contains struck-through affiliate extra-offer blocks; per page presentation these are treated
